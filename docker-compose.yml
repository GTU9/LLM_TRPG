version: "3.8"

services:
  llm-trpg:
    build:
      context: .
      dockerfile: Dockerfile
    image: gtu9/llm-trpg:latest
    container_name: llm-trpg
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8501}:8501"
    env_file:
      - path: .env            # 로컬 개발용 (.env 파일 없으면 무시됨)
        required: false
    volumes:
      - ./data:/app/data      # 게임 로그 영속 저장
    environment:
      - TZ=Asia/Seoul
      - STREAMLIT_SERVER_BASE_URL_PATH=${APP_BASE_PATH:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}   # .env 없을 때 직접 주입
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:8501/${APP_BASE_PATH:+${APP_BASE_PATH}/}_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
